<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Arunkumar Akilan</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="root">
      <div class="container">
        <header class="header">
          <h1>TV Show Episode</h1>

          <div class="filter">
            <!-- SHOW DROPDOWN -->
            <select id="show-list">
              <option value="">All Show</option>
            </select>

            <!-- EPISODE DROPDOWN -->
            <select id="episode-list">
              <option value="">All episodes</option>
            </select>

            <!-- SEARCH -->
            <div class="search-wrapper">
              <input type="search" id="search" placeholder="Search episodes" />
            </div>

            <!-- COUNT -->
            <p id="count-result"></p>
            <button id="back-btn">← Back to Shows</button>
          </div>
        </header>
        <main class="main-content">
          <!-- SHOWS -->
          <div id="show-container"></div>

          <!-- Episodes -->
          <div id="episode-container"></div>
        </main>
        <footer>
          <p>Made BY CYF Trainee</p>
          <p>The data has originally come from (https://tvmaze.com)</p>
        </footer>
      </div>
    </div>
    <!-- SIDE PANEL -->
    <div id="side-panel" class="side-panel">
      <div class="side-panel-content">
        <!-- IMAGE -->
        <div class="panel-left">
          <img id="panel-image" />
        </div>

        <!-- DETAILS -->
        <div class="panel-right">
          <button id="close-panel" class="close-btn">✖</button>

          <h2 id="panel-title"></h2>

          <p id="panel-rating"></p>
          <p id="panel-genres"></p>
          <p id="panel-runtime"></p>
          <p id="panel-status"></p>

          <div class="panel-summary">
            <h3>Summary</h3>
            <p id="panel-summary-text"></p>
          </div>
        </div>
      </div>
    </div>

    <!-- SHOW TEMPLATE -->
    <template id="show-template">
      <section class="show-card">
        <img />
        <h2></h2>
        <p></p>
      </section>
    </template>

    <!-- EPISODE TEMPLATE -->
    <template id="episode-template">
      <section class="episode-card">
        <img />
        <p></p>
        <h3></h3>
      </section>
    </template>

    <!-- ONLY THIS SCRIPT -->
    <script src="script.js"></script>
  </body>
</html>
