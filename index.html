<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Ahmad Roman (RomanSanaye)</title>

    <link rel="stylesheet" href="style.css" />
<!-- SHOWS -->
    <div id="show-container"></div>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div id="root">
      <div id="container">
        <header class="header">
          <h1 class="title">TV Show Episode Guide</h1>
          <div class="filters">
            <select id="select"></select>
            <input
              type="text"
              id="input-box"
              placeholder="Search shows or episodes"
            />
          </div>

          <div class="info">
            <p id="show-count"></p>
            <p id="episode-count"></p>
            <button id="back-btn" style="display:none;">← Back</button>
          </div>
        </header>
    
                  <!-- Episodes-->
        <main id="episodes-list"></main>
                  <!-- SHOWS -->
        <div id="show-list"></div>

        <!-- ================= SHOW TEMPLATE -->
        <template id="show-template">
          <div class="show-card card">
            <div class="episode-image">
              <img src="" alt="show image" />
            </div>

            <h3 class="episode-title"></h3>

            <p class="episode-info show-summary"></p>
          </div>
        </template>

        <!-- ================= EPISODE TEMPLATE -->
        <template id="episode-template">
          <div class="episode-card card">
            <div class="episode-image">
              <img src="" alt="episode image" />
            </div>

            <p class="season-episode"></p>

            <h3 class="episode-title"></h3>

            <p class="episode-info episode-summary"></p>

            <a href="#" class="read-more">Read more</a>
          </div>
        </template>

        <footer class="footer">
          <p>Made by CYF Trainees</p>
          <p>The data has originally come from "https://tvmaze.com"</p>
        </footer>

      </div>

    <!-- Loads YOUR javascript code -->
    <script src="script.js" defer></script>
  </body>
</html>
